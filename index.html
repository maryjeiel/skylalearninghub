<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Learning Game</title>
  <style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg, #ffefba, #ffffff, #d4fc79);
  color: #1d1d1f;
  min-height: 100vh;
}
.app { width: min(1100px, 94vw); margin: 0 auto; padding: 24px 0; }
header {
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  background: white; border-radius: 28px; padding: 20px 24px; box-shadow: 0 12px 30px rgba(0,0,0,.12);
}
h1 { margin: 0; font-size: clamp(30px, 5vw, 56px); color: #472183; }
p { font-size: 20px; line-height: 1.35; }
.score-box { background: #fff3a3; border: 4px solid #ffcf33; border-radius: 22px; padding: 14px 22px; text-align: center; min-width: 110px; }
.score-box span { display:block; font-weight: 700; }
.score-box strong { font-size: 38px; color: #9b5de5; }
.hero { text-align: center; margin: 26px 0; background: rgba(255,255,255,.85); border-radius: 28px; padding: 20px; }
.hero h2 { margin: 0; font-size: clamp(28px, 4vw, 48px); color: #ff5c8a; }
.grid { display: grid; grid-template-columns: repeat(2, minmax(220px, 1fr)); gap: 20px; }
.card {
  border: 0; border-radius: 30px; padding: 30px 24px; text-align: left; cursor: pointer;
  box-shadow: 0 14px 28px rgba(0,0,0,.16); transition: transform .15s, filter .15s;
  color: #111; min-height: 220px;
}
.card:hover, .choice:hover, .small-btn:hover { transform: translateY(-4px); filter: brightness(1.03); }
.card span { font-size: 64px; display: block; }
.card h3 { margin: 8px 0; font-size: 36px; }
.card p { margin: 0; font-weight: 700; }
.math { background: #7bdff2; }
.reading { background: #f2b5d4; }
.science { background: #b2f7ef; }
.worksheet { background: #ffd166; }
.lesson-card { background: white; border-radius: 28px; padding: 24px; margin-top: 22px; box-shadow: 0 12px 28px rgba(0,0,0,.12); }
.top-row { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap: wrap; }
.back, .small-btn {
  border: 0; background: #472183; color: white; border-radius: 18px; padding: 14px 20px; font-size: 18px; font-weight: 800; cursor: pointer;
}
.topic-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap:16px; margin-top:18px; }
.topic { border:0; border-radius:22px; padding:22px; background:#fff3a3; font-size:24px; font-weight:900; cursor:pointer; box-shadow:0 8px 18px rgba(0,0,0,.12); }
.question-box { background:#ffffff; border-radius:30px; padding:26px; margin-top:22px; box-shadow:0 12px 28px rgba(0,0,0,.12); }
.progress { height: 18px; background:#ddd; border-radius: 20px; overflow:hidden; margin: 16px 0; }
.progress div { height:100%; background:#06d6a0; width:0%; transition: width .3s; }
.question { font-size: clamp(28px, 4vw, 48px); font-weight: 900; text-align: center; margin: 22px 0; color:#2d00f7; }
.choices { display:grid; grid-template-columns: repeat(2, minmax(180px,1fr)); gap:16px; }
.choice { border: 4px solid #222; background:#fff; border-radius:24px; padding:22px; font-size:30px; font-weight:900; cursor:pointer; min-height:100px; }
.choice.correct { background:#b8f7c1; }
.choice.wrong { background:#ffb3b3; }
.message { text-align:center; font-size:28px; font-weight:900; min-height:40px; }
.mascot { text-align:center; font-size:80px; animation: bounce 1.8s infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.worksheet-area { background:white; border-radius:28px; padding:24px; margin-top:22px; }
.print-sheet { background:white; padding:20px; }
.print-sheet h2 { font-size:32px; }
.line { border-bottom:2px solid #222; height:44px; margin:10px 0; font-size:24px; }
@media (max-width: 700px) { header, .grid, .choices { grid-template-columns:1fr; display:grid; } .card { min-height: 180px; } }
@media print { body { background:white; } header, .hero, .grid, .top-row, .small-btn, .back { display:none !important; } .worksheet-area { box-shadow:none; } }

</style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>Happy Learning 🌈</h1>
        <p>Math, Reading, and printable practice for Grade 1 learners.</p>
      </div>
      <div class="score-box">
        <span>⭐ Stars</span>
        <strong id="stars">0</strong>
      </div>
    </header>

    <main id="screen"></main>
  </div>

  <template id="home-template">
    <section class="hero">
      <h2>Hello, little learner! 👋</h2>
      <p>Choose a subject and start playing.</p>
    </section>

    <section class="grid subjects">
      <button class="card math" data-subject="math">
        <span>🧮</span>
        <h3>Math</h3>
        <p>Numbers, addition, subtraction, shapes, time.</p>
      </button>
      <button class="card reading" data-subject="reading">
        <span>📖</span>
        <h3>Reading</h3>
        <p>Letters, sounds, sight words, short sentences.</p>
      </button>
      <button class="card science" data-subject="science">
        <span>🌎</span>
        <h3>Science</h3>
        <p>Animals, plants, body parts, weather.</p>
      </button>
      <button class="card worksheet" id="worksheetBtn">
        <span>🖨️</span>
        <h3>Worksheets</h3>
        <p>Print simple practice sheets.</p>
      </button>
    </section>
  </template>

  <script>
const QUESTION_BANK = {
  math: {
    title: "Math 🧮",
    topics: {
      counting: { name: "Counting 1 to 20", questions: [
        q("What number comes after 1?", ["2", "3", "5", "0"], "2"),
        q("What number comes after 4?", ["3", "5", "8", "1"], "5"),
        q("What number comes before 10?", ["8", "9", "11", "7"], "9"),
        q("Count: 🍎🍎🍎", ["2", "3", "4", "5"], "3"),
        q("Count: 🐶🐶🐶🐶🐶", ["4", "5", "6", "3"], "5"),
        q("Which is bigger?", ["6", "2", "1", "0"], "6"),
        q("Which is smaller?", ["9", "7", "3", "8"], "3"),
        q("What number comes after 12?", ["11", "13", "15", "10"], "13"),
        q("What number comes before 18?", ["16", "17", "19", "20"], "17"),
        q("Count: ⭐⭐⭐⭐⭐⭐⭐", ["5", "6", "7", "8"], "7"),
        q("Which number is missing? 1, 2, __, 4", ["3", "5", "6", "0"], "3"),
        q("Which number is missing? 8, 9, __, 11", ["7", "10", "12", "6"], "10")
      ]},
      addition: { name: "Addition", questions: [
        q("1 + 1 = ?", ["1", "2", "3", "4"], "2"), q("2 + 3 = ?", ["4", "5", "6", "7"], "5"),
        q("4 + 2 = ?", ["5", "6", "7", "8"], "6"), q("5 + 5 = ?", ["9", "10", "11", "12"], "10"),
        q("3 + 4 = ?", ["6", "7", "8", "9"], "7"), q("6 + 1 = ?", ["5", "6", "7", "8"], "7"),
        q("🍌🍌 + 🍌 = ?", ["2", "3", "4", "5"], "3"), q("🐱🐱🐱 + 🐱🐱 = ?", ["4", "5", "6", "7"], "5"),
        q("7 + 2 = ?", ["8", "9", "10", "11"], "9"), q("8 + 1 = ?", ["7", "8", "9", "10"], "9"),
        q("9 + 1 = ?", ["9", "10", "11", "12"], "10"), q("10 + 2 = ?", ["11", "12", "13", "14"], "12")
      ]},
      subtraction: { name: "Subtraction", questions: [
        q("2 - 1 = ?", ["0", "1", "2", "3"], "1"), q("5 - 2 = ?", ["2", "3", "4", "5"], "3"),
        q("6 - 3 = ?", ["2", "3", "4", "5"], "3"), q("10 - 5 = ?", ["4", "5", "6", "7"], "5"),
        q("8 - 1 = ?", ["6", "7", "8", "9"], "7"), q("9 - 4 = ?", ["4", "5", "6", "7"], "5"),
        q("🍎🍎🍎 take away 🍎 = ?", ["1", "2", "3", "4"], "2"), q("7 - 2 = ?", ["4", "5", "6", "7"], "5"),
        q("4 - 4 = ?", ["0", "1", "2", "4"], "0"), q("12 - 2 = ?", ["9", "10", "11", "12"], "10")
      ]},
      shapes: { name: "Shapes", questions: [
        q("Which shape is round?", ["Circle", "Square", "Triangle", "Rectangle"], "Circle"),
        q("How many sides does a triangle have?", ["2", "3", "4", "5"], "3"),
        q("How many sides does a square have?", ["3", "4", "5", "6"], "4"),
        q("Which shape looks like a door?", ["Circle", "Triangle", "Rectangle", "Star"], "Rectangle"),
        q("Which shape has no corners?", ["Circle", "Square", "Triangle", "Diamond"], "Circle"),
        q("Which shape has 4 equal sides?", ["Square", "Circle", "Triangle", "Oval"], "Square")
      ]}
    }
  },
  reading: {
    title: "Reading 📖",
    topics: {
      alphabet: { name: "Alphabet", questions: [
        q("What letter starts Apple?", ["A", "B", "C", "D"], "A"), q("What letter starts Ball?", ["A", "B", "C", "D"], "B"),
        q("What letter starts Cat?", ["C", "D", "E", "F"], "C"), q("What letter starts Dog?", ["B", "C", "D", "E"], "D"),
        q("Which is lowercase A?", ["a", "b", "c", "d"], "a"), q("Which is uppercase m?", ["M", "N", "W", "H"], "M"),
        q("What comes after A?", ["B", "C", "D", "Z"], "B"), q("What comes after C?", ["A", "B", "D", "E"], "D")
      ]},
      sounds: { name: "Beginning Sounds", questions: [
        q("Sun starts with what sound?", ["s", "m", "t", "p"], "s"), q("Fish starts with what sound?", ["f", "b", "d", "r"], "f"),
        q("Map starts with what sound?", ["n", "m", "s", "c"], "m"), q("Pig starts with what sound?", ["p", "g", "t", "l"], "p"),
        q("Red starts with what sound?", ["r", "w", "y", "e"], "r"), q("Hat starts with what sound?", ["h", "a", "t", "s"], "h")
      ]},
      sight: { name: "Sight Words", questions: [
        q("Find the word: the", ["the", "and", "cat", "run"], "the"), q("Find the word: and", ["an", "and", "end", "ant"], "and"),
        q("Find the word: is", ["in", "it", "is", "if"], "is"), q("Find the word: you", ["yes", "you", "your", "yam"], "you"),
        q("Find the word: like", ["look", "lake", "like", "line"], "like"), q("Find the word: can", ["cat", "can", "car", "cap"], "can")
      ]},
      sentences: { name: "Short Sentences", questions: [
        q("I see a cat. What animal?", ["cat", "dog", "fish", "bird"], "cat"),
        q("The sun is hot. What is hot?", ["moon", "sun", "rain", "snow"], "sun"),
        q("A bird can fly. Who can fly?", ["bird", "fish", "pig", "cow"], "bird"),
        q("The dog can run. What can the dog do?", ["jump", "sleep", "run", "swim"], "run"),
        q("I like red. What color?", ["blue", "red", "green", "pink"], "red")
      ]}
    }
  },
  science: {
    title: "Science 🌎",
    topics: {
      animals: { name: "Animals", questions: [
        q("Which animal says meow?", ["Dog", "Cat", "Cow", "Duck"], "Cat"), q("Which animal is the biggest?", ["Whale", "Rabbit", "Cat", "Dog"], "Whale"),
        q("Which animal can fly?", ["Bird", "Fish", "Cow", "Horse"], "Bird"), q("Which animal lives in water?", ["Fish", "Lion", "Bear", "Chicken"], "Fish"),
        q("Which animal gives us milk?", ["Cow", "Snake", "Frog", "Bird"], "Cow")
      ]},
      weather: { name: "Weather", questions: [
        q("What do we use when it rains?", ["Umbrella", "Sunglasses", "Fan", "Pillow"], "Umbrella"),
        q("What shines in the day?", ["Sun", "Moon", "Stars", "Cloud"], "Sun"),
        q("What is white and fluffy in the sky?", ["Cloud", "Rock", "Tree", "Fish"], "Cloud"),
        q("When it is cold, we wear a...", ["jacket", "swimsuit", "shorts", "slippers"], "jacket")
      ]}
    }
  }
};
function q(question, choices, answer) { return { question, choices, answer }; }

</script>
  <script>
const screen = document.getElementById('screen');
const starsEl = document.getElementById('stars');
let stars = Number(localStorage.getItem('happyStars') || 0);
let current = { subject: null, topic: null, index: 0, score: 0, questions: [] };
starsEl.textContent = stars;

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text.replace(/[🍎🐶⭐🍌🐱]/g, ''));
  utter.rate = 0.82;
  utter.pitch = 1.2;
  window.speechSynthesis.speak(utter);
}
function saveStars(n) { stars += n; localStorage.setItem('happyStars', stars); starsEl.textContent = stars; }
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
function showHome() {
  screen.innerHTML = document.getElementById('home-template').innerHTML;
  document.querySelectorAll('[data-subject]').forEach(btn => btn.onclick = () => showSubject(btn.dataset.subject));
  document.getElementById('worksheetBtn').onclick = showWorksheets;
}
function showSubject(subject) {
  const data = QUESTION_BANK[subject];
  screen.innerHTML = `
    <section class="lesson-card">
      <div class="top-row"><button class="back">← Home</button><h2>${data.title}</h2></div>
      <p>Pick a topic. The computer will read the question out loud.</p>
      <div class="topic-grid">
        ${Object.entries(data.topics).map(([key,t]) => `<button class="topic" data-topic="${key}">${t.name}</button>`).join('')}
      </div>
    </section>`;
  document.querySelector('.back').onclick = showHome;
  document.querySelectorAll('.topic').forEach(btn => btn.onclick = () => startLesson(subject, btn.dataset.topic));
}
function startLesson(subject, topic) {
  const topicData = QUESTION_BANK[subject].topics[topic];
  current = { subject, topic, index: 0, score: 0, questions: shuffle(topicData.questions) };
  showQuestion();
}
function showQuestion() {
  const total = current.questions.length;
  if (current.index >= total) return finishLesson();
  const item = current.questions[current.index];
  const progress = Math.round((current.index / total) * 100);
  screen.innerHTML = `
    <section class="question-box">
      <div class="top-row">
        <button class="back">← Topics</button>
        <button class="small-btn" id="repeatBtn">🔊 Repeat</button>
      </div>
      <div class="progress"><div style="width:${progress}%"></div></div>
      <div class="mascot">🦊</div>
      <div class="question">${item.question}</div>
      <div class="choices">
        ${shuffle(item.choices).map(choice => `<button class="choice">${choice}</button>`).join('')}
      </div>
      <p class="message" id="message"></p>
    </section>`;
  document.querySelector('.back').onclick = () => showSubject(current.subject);
  document.getElementById('repeatBtn').onclick = () => speak(item.question);
  document.querySelectorAll('.choice').forEach(btn => btn.onclick = () => answer(btn, item.answer));
  speak(item.question);
}
function answer(btn, correct) {
  document.querySelectorAll('.choice').forEach(b => b.disabled = true);
  const msg = document.getElementById('message');
  if (btn.textContent === correct) {
    btn.classList.add('correct');
    msg.textContent = 'Great job! ⭐';
    current.score++;
    saveStars(1);
    speak('Great job!');
  } else {
    btn.classList.add('wrong');
    msg.textContent = `Good try! The answer is ${correct}.`;
    speak(`Good try. The answer is ${correct}.`);
    [...document.querySelectorAll('.choice')].find(b => b.textContent === correct)?.classList.add('correct');
  }
  setTimeout(() => { current.index++; showQuestion(); }, 1600);
}
function finishLesson() {
  const total = current.questions.length;
  screen.innerHTML = `
    <section class="lesson-card" style="text-align:center">
      <div class="mascot">🎉</div>
      <h2>Lesson Finished!</h2>
      <p>You got <strong>${current.score}</strong> out of <strong>${total}</strong>.</p>
      <button class="small-btn" id="again">Play Again</button>
      <button class="small-btn" id="topics">Choose Topic</button>
      <button class="small-btn" id="home">Home</button>
    </section>`;
  speak(`Lesson finished. You got ${current.score} out of ${total}.`);
  document.getElementById('again').onclick = () => startLesson(current.subject, current.topic);
  document.getElementById('topics').onclick = () => showSubject(current.subject);
  document.getElementById('home').onclick = showHome;
}
function showWorksheets() {
  screen.innerHTML = `
    <section class="worksheet-area">
      <div class="top-row"><button class="back">← Home</button><button class="small-btn" onclick="window.print()">🖨️ Print</button></div>
      <div class="print-sheet">
        <h2>Math Practice</h2>
        ${['1 + 1 = ____','2 + 3 = ____','5 - 2 = ____','10 - 4 = ____','Count: ⭐⭐⭐⭐⭐ = ____'].map(x => `<div class="line">${x}</div>`).join('')}
        <h2>Reading Practice</h2>
        ${['Trace: A A A A','Trace: B B B B','Circle the word: cat','Write a word that starts with S: ______','Read: I see a dog.'].map(x => `<div class="line">${x}</div>`).join('')}
        <h2>Drawing</h2>
        <div class="line">Draw a happy sun:</div><div style="height:180px;border:3px dashed #222;border-radius:20px"></div>
      </div>
    </section>`;
  document.querySelector('.back').onclick = showHome;
}
showHome();

</script>
</body>
</html>
