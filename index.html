<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big & Small — A Size Adventure!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:#7ec8e3;
    --sky2:#b8e6f0;
    --sun:#ffd23f;
    --coral:#ff6b6b;
    --grass:#6bcf7f;
    --grape:#9b5de5;
    --ink:#28384d;
    --cream:#fff9ec;
    --shadow:rgba(40,56,77,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Fredoka',sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg,var(--sky) 0%,var(--sky2) 55%,#d7f2dd 100%);
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }
  /* floating bubbles background */
  .bubble{position:fixed;border-radius:50%;background:rgba(255,255,255,.35);pointer-events:none;animation:rise linear infinite;z-index:0;}
  @keyframes rise{
    from{transform:translateY(110vh) scale(.6);opacity:0;}
    10%{opacity:.7;}
    90%{opacity:.7;}
    to{transform:translateY(-15vh) scale(1.1);opacity:0;}
  }
  .wrap{position:relative;z-index:2;max-width:760px;margin:0 auto;padding:20px 18px 60px;}

  h1{
    font-family:'Baloo 2',cursive;font-weight:800;
    text-align:center;font-size:clamp(2rem,7vw,3.4rem);
    color:#fff;line-height:1.05;margin-top:10px;
    text-shadow:0 4px 0 var(--coral),0 8px 14px var(--shadow);
  }
  h1 .small{color:var(--sun);text-shadow:0 4px 0 #e0962f,0 8px 14px var(--shadow);}
  .tagline{text-align:center;font-size:1.15rem;color:var(--ink);opacity:.8;margin:6px 0 22px;font-weight:500;}

  /* menu cards */
  .menu{display:grid;gap:16px;}
  .mode-btn{
    border:none;cursor:pointer;font-family:'Baloo 2',cursive;font-weight:700;
    background:var(--cream);border-radius:26px;padding:22px 24px;
    box-shadow:0 8px 0 var(--shadow),0 14px 24px rgba(40,56,77,.12);
    display:flex;align-items:center;gap:18px;text-align:left;
    transition:transform .12s ease,box-shadow .12s ease;color:var(--ink);
  }
  .mode-btn:hover{transform:translateY(-3px);box-shadow:0 11px 0 var(--shadow),0 18px 30px rgba(40,56,77,.16);}
  .mode-btn:active{transform:translateY(4px);box-shadow:0 4px 0 var(--shadow);}
  .mode-btn .emoji{font-size:2.6rem;flex-shrink:0;filter:drop-shadow(0 3px 4px rgba(0,0,0,.12));}
  .mode-btn .t{font-size:1.5rem;}
  .mode-btn .d{font-family:'Fredoka',sans-serif;font-weight:400;font-size:1rem;opacity:.75;display:block;margin-top:2px;}
  .c1{box-shadow:0 8px 0 #d98c8c,0 14px 24px rgba(40,56,77,.12);}
  .c1:hover{box-shadow:0 11px 0 #d98c8c,0 18px 30px rgba(40,56,77,.16);}
  .c1:active{box-shadow:0 4px 0 #d98c8c;}
  .c2{box-shadow:0 8px 0 #4ca85f,0 14px 24px rgba(40,56,77,.12);}
  .c2:hover{box-shadow:0 11px 0 #4ca85f,0 18px 30px rgba(40,56,77,.16);}
  .c2:active{box-shadow:0 4px 0 #4ca85f;}
  .c3{box-shadow:0 8px 0 #7a45c4,0 14px 24px rgba(40,56,77,.12);}
  .c3:hover{box-shadow:0 11px 0 #7a45c4,0 18px 30px rgba(40,56,77,.16);}
  .c3:active{box-shadow:0 4px 0 #7a45c4;}

  /* screens */
  .screen{display:none;animation:pop .35s cubic-bezier(.2,1.3,.5,1);}
  .screen.active{display:block;}
  @keyframes pop{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}

  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:10px;}
  .back{
    border:none;cursor:pointer;background:#fff;border-radius:18px;padding:10px 18px;
    font-family:'Baloo 2',cursive;font-weight:700;font-size:1rem;color:var(--ink);
    box-shadow:0 5px 0 var(--shadow);transition:transform .1s;
  }
  .back:active{transform:translateY(3px);box-shadow:0 2px 0 var(--shadow);}
  .score{
    background:var(--sun);border-radius:18px;padding:10px 20px;font-family:'Baloo 2',cursive;
    font-weight:800;font-size:1.1rem;box-shadow:0 5px 0 #e0962f;color:var(--ink);
  }
  .score .star{color:#fff;}

  .card{
    background:var(--cream);border-radius:30px;padding:26px 22px;
    box-shadow:0 12px 30px rgba(40,56,77,.16);text-align:center;
  }
  .q{font-family:'Baloo 2',cursive;font-weight:700;font-size:clamp(1.4rem,5vw,2rem);margin-bottom:22px;line-height:1.2;}

  /* two-choice (which is bigger) */
  .versus{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;}
  .choice{
    border:none;cursor:pointer;background:#fff;border-radius:24px;padding:24px 12px;
    box-shadow:0 7px 0 #d6cdb6,0 12px 20px rgba(40,56,77,.1);transition:transform .12s,box-shadow .12s;
    display:flex;flex-direction:column;align-items:center;gap:10px;
  }
  .choice:hover{transform:translateY(-4px);}
  .choice:active{transform:translateY(3px);box-shadow:0 3px 0 #d6cdb6;}
  .choice .pic{font-size:3.6rem;filter:drop-shadow(0 4px 5px rgba(0,0,0,.12));}
  .choice .name{font-family:'Baloo 2',cursive;font-weight:700;font-size:1.25rem;}
  .vs{font-family:'Baloo 2',cursive;font-weight:800;font-size:1.5rem;color:var(--coral);}
  .choice.correct{background:#d4f7d9;box-shadow:0 7px 0 #7ad08a;animation:wiggle .5s;}
  .choice.wrong{background:#ffe0e0;box-shadow:0 7px 0 #f0a3a3;animation:shake .4s;}
  .choice:disabled{cursor:default;}
  @keyframes wiggle{0%,100%{transform:rotate(0);}25%{transform:rotate(-4deg) scale(1.05);}75%{transform:rotate(4deg) scale(1.05);}}
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}

  /* order game */
  .order-list{display:flex;flex-direction:column;gap:10px;margin:6px 0 18px;}
  .order-item{
    border:none;cursor:pointer;background:#fff;border-radius:20px;padding:14px 18px;
    display:flex;align-items:center;gap:14px;font-family:'Baloo 2',cursive;font-weight:700;font-size:1.2rem;
    box-shadow:0 5px 0 #d6cdb6;transition:transform .1s;
  }
  .order-item:active{transform:scale(.97);}
  .order-item .num{
    background:var(--grape);color:#fff;width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;
  }
  .order-item .pic{font-size:2rem;}
  .order-item.locked{opacity:.55;}
  .hint{font-size:1rem;opacity:.7;font-weight:500;margin-bottom:8px;}

  /* fact cards */
  .fact-emoji{font-size:5rem;margin-bottom:10px;filter:drop-shadow(0 5px 8px rgba(0,0,0,.12));animation:bob 3s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
  .fact-text{font-size:1.3rem;line-height:1.5;font-weight:500;margin-bottom:8px;}
  .fact-big{font-family:'Baloo 2',cursive;font-weight:800;color:var(--coral);font-size:1.6rem;}

  /* feedback */
  .feedback{min-height:42px;font-family:'Baloo 2',cursive;font-weight:800;font-size:1.4rem;margin-top:20px;}
  .feedback.good{color:var(--grass);}
  .feedback.oops{color:var(--coral);}
  .learn{
    background:#fff7d6;border-radius:18px;padding:14px 16px;margin-top:14px;font-size:1.05rem;
    font-weight:500;line-height:1.45;display:none;border:3px dashed var(--sun);
  }
  .learn.show{display:block;animation:pop .3s;}
  .learn b{color:var(--grape);}

  .next-btn{
    border:none;cursor:pointer;font-family:'Baloo 2',cursive;font-weight:800;font-size:1.3rem;color:#fff;
    background:var(--grape);border-radius:22px;padding:16px 38px;margin-top:18px;
    box-shadow:0 6px 0 #7a45c4;transition:transform .1s;display:none;
  }
  .next-btn.show{display:inline-block;animation:pop .3s;}
  .next-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #7a45c4;}

  .footer{text-align:center;margin-top:30px;font-size:.95rem;color:var(--ink);opacity:.55;font-weight:500;}

  /* celebration confetti */
  .confetti{position:fixed;top:-20px;font-size:1.5rem;z-index:50;pointer-events:none;animation:fall 2.2s ease-in forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:0;}}
</style>
</head>
<body>

<div class="wrap">
  <!-- ===== MENU ===== -->
  <div id="menu" class="screen active">
    <h1>Big &amp; <span class="small">Small</span></h1>
    <p class="tagline">🔬 A size adventure from teeny viruses to giant whales! 🐋</p>
    <div class="menu">
      <button class="mode-btn c1" onclick="startBigger()">
        <span class="emoji">⚖️</span>
        <span><span class="t">Which is BIGGER?</span><span class="d">Tap the bigger one. Easy peasy!</span></span>
      </button>
      <button class="mode-btn c2" onclick="startOrder()">
        <span class="emoji">📏</span>
        <span><span class="t">Line Them Up!</span><span class="d">Tap from smallest to biggest.</span></span>
      </button>
      <button class="mode-btn c3" onclick="startFacts()">
        <span class="emoji">💡</span>
        <span><span class="t">Wow Facts!</span><span class="d">Cool secrets about big & small.</span></span>
      </button>
    </div>
    <p class="footer">Made with love for a curious 6-year-old 💛</p>
  </div>

  <!-- ===== WHICH IS BIGGER ===== -->
  <div id="bigger" class="screen">
    <div class="topbar">
      <button class="back" onclick="goMenu()">⬅ Home</button>
      <div class="score">⭐ <span id="biggerScore">0</span></div>
    </div>
    <div class="card">
      <div class="q">Which one is <span style="color:var(--coral)">BIGGER</span>? 🤔</div>
      <div class="versus">
        <button class="choice" id="optA" onclick="pickBigger(0)"></button>
        <span class="vs">VS</span>
        <button class="choice" id="optB" onclick="pickBigger(1)"></button>
      </div>
      <div class="feedback" id="biggerFb"></div>
      <div class="learn" id="biggerLearn"></div>
      <button class="next-btn" id="biggerNext" onclick="nextBigger()">Next ➡</button>
    </div>
  </div>

  <!-- ===== ORDER GAME ===== -->
  <div id="order" class="screen">
    <div class="topbar">
      <button class="back" onclick="goMenu()">⬅ Home</button>
      <div class="score">⭐ <span id="orderScore">0</span></div>
    </div>
    <div class="card">
      <div class="q">Tap them <span style="color:var(--grass)">smallest&nbsp;➜&nbsp;biggest</span>!</div>
      <p class="hint">Tap the tiniest one first. 🐜 ... 🐘</p>
      <div class="order-list" id="orderList"></div>
      <div class="feedback" id="orderFb"></div>
      <div class="learn" id="orderLearn"></div>
      <button class="next-btn" id="orderNext" onclick="nextOrder()">Play again ➡</button>
    </div>
  </div>

  <!-- ===== FACTS ===== -->
  <div id="facts" class="screen">
    <div class="topbar">
      <button class="back" onclick="goMenu()">⬅ Home</button>
      <div class="score">📖 <span id="factNum">1</span>/<span id="factTotal">1</span></div>
    </div>
    <div class="card">
      <div class="fact-emoji" id="factEmoji">💡</div>
      <div class="fact-text" id="factText"></div>
      <button class="next-btn show" id="factNext" onclick="nextFact()">Another one! ➡</button>
    </div>
  </div>
</div>

<script>
/* ---------- floating bubbles ---------- */
(function(){
  for(let i=0;i<14;i++){
    const b=document.createElement('div');
    b.className='bubble';
    const s=20+Math.random()*70;
    b.style.width=s+'px';b.style.height=s+'px';
    b.style.left=Math.random()*100+'vw';
    b.style.animationDuration=(9+Math.random()*10)+'s';
    b.style.animationDelay=(-Math.random()*15)+'s';
    document.body.appendChild(b);
  }
})();

/* ---------- the living things, smallest to biggest ---------- */
/* size = approximate length/height in METERS, used only for ordering */
const THINGS = [
  {name:"Virus",      pic:"🦠", size:0.0000001,  fact:"Way too tiny to see, even with a normal magnifying glass!"},
  {name:"Bacteria",   pic:"🧫", size:0.000002,   fact:"100 times bigger than a virus, but still super teeny."},
  {name:"Amoeba",     pic:"🟢", size:0.0002,     fact:"A blobby creature made of just ONE cell."},
  {name:"Water Bear", pic:"🐻", size:0.001,      fact:"A tiny 'tardigrade' that can live almost anywhere — even space!"},
  {name:"Ant",        pic:"🐜", size:0.004,      fact:"Can lift 50 times its own weight. Super strong!"},
  {name:"Mouse",      pic:"🐭", size:0.09,       fact:"So light it can fall from a tree and run away just fine."},
  {name:"Cat",        pic:"🐱", size:0.45,       fact:"About as long as your arm."},
  {name:"Human",      pic:"🧍", size:1.7,        fact:"That's you! About 1,000 times bigger than a water bear."},
  {name:"Horse",      pic:"🐴", size:2.5,        fact:"Tall enough to look over your head."},
  {name:"Elephant",   pic:"🐘", size:4,          fact:"So heavy it can barely jump at all!"},
  {name:"Giraffe",    pic:"🦒", size:5.5,        fact:"The tallest animal on land — taller than a house!"},
  {name:"T. rex",     pic:"🦖", size:12,         fact:"A giant dino, as long as a school bus!"},
  {name:"Whale Shark",pic:"🦈", size:18,         fact:"The biggest fish swimming in the ocean."},
  {name:"Blue Whale", pic:"🐋", size:30,         fact:"The BIGGEST animal ever — bigger than any dinosaur!"}
];

/* ---------- screen switching ---------- */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function goMenu(){show('menu');}

function rand(n){return Math.floor(Math.random()*n);}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=rand(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}

function confetti(){
  const em=['🎉','⭐','🌟','✨','🎊','💛','💚'];
  for(let i=0;i<26;i++){
    const c=document.createElement('div');
    c.className='confetti';c.textContent=em[rand(em.length)];
    c.style.left=Math.random()*100+'vw';
    c.style.animationDelay=(Math.random()*.5)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2700);
  }
}

/* ========== GAME 1: WHICH IS BIGGER ========== */
let biggerScore=0, biggerPair=[], biggerAnswered=false;

function startBigger(){biggerScore=0;document.getElementById('biggerScore').textContent=0;show('bigger');nextBigger();}

function nextBigger(){
  biggerAnswered=false;
  document.getElementById('biggerFb').textContent='';
  document.getElementById('biggerFb').className='feedback';
  document.getElementById('biggerLearn').className='learn';
  document.getElementById('biggerNext').className='next-btn';
  // pick two different things that are not too close in size
  let a=rand(THINGS.length), b=rand(THINGS.length);
  while(b===a||Math.abs(a-b)<2){b=rand(THINGS.length);}
  biggerPair=shuffle([THINGS[a],THINGS[b]]);
  renderChoice('optA',biggerPair[0]);
  renderChoice('optB',biggerPair[1]);
}
function renderChoice(id,thing){
  const el=document.getElementById(id);
  el.className='choice';el.disabled=false;
  el.innerHTML=`<span class="pic">${thing.pic}</span><span class="name">${thing.name}</span>`;
}
function pickBigger(i){
  if(biggerAnswered)return;
  biggerAnswered=true;
  const chosen=biggerPair[i], other=biggerPair[1-i];
  const optA=document.getElementById('optA'), optB=document.getElementById('optB');
  optA.disabled=true;optB.disabled=true;
  const fb=document.getElementById('biggerFb');
  const learn=document.getElementById('biggerLearn');
  const bigger = biggerPair[0].size>biggerPair[1].size ? biggerPair[0]:biggerPair[1];
  const biggerEl = (bigger===biggerPair[0])?optA:optB;
  if(chosen===bigger){
    biggerScore++;document.getElementById('biggerScore').textContent=biggerScore;
    (i===0?optA:optB).classList.add('correct');
    fb.textContent='🎉 YES! Great job!';fb.className='feedback good';
    confetti();
  }else{
    (i===0?optA:optB).classList.add('wrong');
    biggerEl.classList.add('correct');
    fb.textContent='Oops! Try the other one next time 😊';fb.className='feedback oops';
  }
  learn.innerHTML=`A <b>${bigger.name.toLowerCase()}</b> ${bigger.pic} is the bigger one! ${bigger.fact}`;
  learn.className='learn show';
  document.getElementById('biggerNext').className='next-btn show';
}

/* ========== GAME 2: LINE THEM UP ========== */
let orderTargets=[], orderPicked=[], orderDone=false;

function startOrder(){document.getElementById('orderScore').textContent=0;orderScoreVal=0;show('order');nextOrder();}
let orderScoreVal=0;

function nextOrder(){
  orderDone=false;orderPicked=[];
  document.getElementById('orderFb').textContent='';
  document.getElementById('orderFb').className='feedback';
  document.getElementById('orderLearn').className='learn';
  document.getElementById('orderNext').className='next-btn';
  // pick 4 distinct things
  const idx=shuffle(THINGS.map((_,i)=>i)).slice(0,4);
  orderTargets=idx.map(i=>THINGS[i]);
  renderOrder(shuffle(orderTargets));
}
function renderOrder(list){
  const box=document.getElementById('orderList');
  box.innerHTML='';
  list.forEach(t=>{
    const b=document.createElement('button');
    b.className='order-item';
    b.dataset.name=t.name;
    b.innerHTML=`<span class="num">?</span><span class="pic">${t.pic}</span><span>${t.name}</span>`;
    b.onclick=()=>pickOrder(b,t);
    box.appendChild(b);
  });
}
function pickOrder(btn,thing){
  if(orderDone||btn.classList.contains('locked'))return;
  // is this the next-smallest among remaining?
  const remaining=orderTargets.filter(t=>!orderPicked.includes(t));
  const smallest=remaining.reduce((a,b)=>a.size<b.size?a:b);
  if(thing===smallest){
    orderPicked.push(thing);
    btn.classList.add('locked');
    btn.querySelector('.num').textContent=orderPicked.length;
    btn.querySelector('.num').style.background='var(--grass)';
    if(orderPicked.length===orderTargets.length){
      orderDone=true;orderScoreVal++;
      document.getElementById('orderScore').textContent=orderScoreVal;
      const fb=document.getElementById('orderFb');
      fb.textContent='🏆 PERFECT! You lined them all up!';fb.className='feedback good';
      confetti();
      const learn=document.getElementById('orderLearn');
      const big=orderPicked[orderPicked.length-1];
      learn.innerHTML=`The <b>${big.name.toLowerCase()}</b> ${big.pic} was the biggest! ${big.fact}`;
      learn.className='learn show';
      document.getElementById('orderNext').className='next-btn show';
    }
  }else{
    const fb=document.getElementById('orderFb');
    fb.textContent='🤏 Not yet! Find a SMALLER one first.';fb.className='feedback oops';
    btn.animate([{transform:'translateX(0)'},{transform:'translateX(-7px)'},{transform:'translateX(7px)'},{transform:'translateX(0)'}],{duration:300});
    setTimeout(()=>{if(!orderDone){fb.textContent='';fb.className='feedback';}},1300);
  }
}

/* ========== GAME 3: WOW FACTS ========== */
const FACTS = [
  {e:"🐜", t:"An <b>ant</b> can carry <span class='fact-big'>50 times</span> its own weight! That's like YOU lifting a car. 🚗"},
  {e:"🐘", t:"An <b>elephant</b> is so big and heavy it can <span class='fact-big'>barely jump</span> at all!"},
  {e:"🐭", t:"A tiny <b>mouse</b> can fall from a tree and <span class='fact-big'>walk away</span> just fine. A person would get hurt!"},
  {e:"🐋", t:"A <b>blue whale</b> is the <span class='fact-big'>biggest animal EVER</span> — even bigger than any dinosaur!"},
  {e:"📦", t:"Make a box <span class='fact-big'>2 times</span> taller and it gets <span class='fact-big'>8 times</span> heavier. Bigger things get heavy FAST!"},
  {e:"🦠", t:"A <b>virus</b> is so small that <span class='fact-big'>millions</span> could fit on the tip of a pin!"},
  {e:"🧫", t:"A <b>bacteria</b> is 100 times bigger than a virus — but you still need a microscope to see it. 🔬"},
  {e:"🐻", t:"A <b>water bear</b> is so tough it can survive in <span class='fact-big'>outer space</span>! 🚀"},
  {e:"🦒", t:"A <b>giraffe</b> can be <span class='fact-big'>taller than a house</span> — about 5 grown-ups stacked up!"},
  {e:"🏰", t:"A <b>giant</b> from a fairy tale couldn't really walk — their legs would be too weak for their huge weight!"},
  {e:"📏", t:"From a <b>tiny virus</b> 🦠 to a <b>giant whale</b> 🐋, sizes jump up about <span class='fact-big'>a BILLION times</span>!"}
];
let factOrder=[], factPos=0;

function startFacts(){
  factOrder=shuffle(FACTS);factPos=0;
  document.getElementById('factTotal').textContent=factOrder.length;
  show('facts');renderFact();
}
function renderFact(){
  const f=factOrder[factPos];
  document.getElementById('factEmoji').textContent=f.e;
  document.getElementById('factText').innerHTML=f.t;
  document.getElementById('factNum').textContent=factPos+1;
}
function nextFact(){
  factPos++;
  if(factPos>=factOrder.length){factPos=0;factOrder=shuffle(FACTS);confetti();}
  renderFact();
}
</script>
</body>
</html>
