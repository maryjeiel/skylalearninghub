<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiny to Titan Guessing Game</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fff7ad, #b7f7ff);
      color: #24324a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .game {
      width: 100%;
      max-width: 760px;
      background: white;
      border-radius: 28px;
      padding: 26px;
      box-shadow: 0 14px 35px rgba(0,0,0,0.14);
      text-align: center;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 34px;
    }
    .subtitle {
      margin: 0 0 20px;
      font-size: 18px;
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      font-size: 18px;
      font-weight: bold;
    }
    .pill {
      background: #f2f5ff;
      padding: 10px 14px;
      border-radius: 999px;
    }
    .card {
      background: #fff9e8;
      border: 3px solid #ffe28a;
      border-radius: 24px;
      padding: 24px;
      min-height: 230px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }
    .emoji {
      font-size: 52px;
    }
    .question {
      font-size: 28px;
      font-weight: bold;
      line-height: 1.25;
    }
    .answers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 18px;
    }
    button {
      border: 0;
      border-radius: 20px;
      padding: 18px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      background: #dce9ff;
      color: #24324a;
      transition: transform 0.12s, background 0.12s;
    }
    button:hover { transform: scale(1.03); }
    .next {
      margin-top: 18px;
      width: 100%;
      background: #8ff0b0;
      display: none;
    }
    .feedback {
      margin-top: 18px;
      font-size: 22px;
      font-weight: bold;
      min-height: 32px;
    }
    .fact {
      margin-top: 8px;
      font-size: 18px;
      line-height: 1.35;
      color: #4b5870;
      min-height: 48px;
    }
    .tiny-note {
      margin-top: 20px;
      font-size: 14px;
      color: #6b7280;
    }
    @media (max-width: 560px) {
      h1 { font-size: 28px; }
      .question { font-size: 23px; }
      .answers { grid-template-columns: 1fr; }
      button { font-size: 18px; }
    }
  </style>
</head>
<body>
  <main class="game">
    <h1>🔬 Tiny to Titan 🐋</h1>
    <p class="subtitle">Guess, learn, and grow your brain!</p>

    <div class="score-row">
      <div class="pill">⭐ Score: <span id="score">0</span></div>
      <div class="pill">Question: <span id="number">1</span>/<span id="total">10</span></div>
    </div>

    <section class="card">
      <div class="emoji" id="emoji">🧠</div>
      <div class="question" id="question">Loading...</div>
    </section>

    <div class="answers" id="answers"></div>

    <div class="feedback" id="feedback"></div>
    <div class="fact" id="fact"></div>

    <button class="next" id="nextBtn">Next question ➜</button>

    <p class="tiny-note">Best played with an adult nearby so she can ask “why?” after each answer.</p>
  </main>

  <script>
    const allQuestions = [
      {
        emoji: "🦠",
        question: "Which one is smaller?",
        answers: ["Virus", "Bacteria"],
        correct: "Virus",
        fact: "A virus can be about 100 nanometers. Bacteria are much bigger, often 1 to 10 micrometers."
      },
      {
        emoji: "🐜",
        question: "Which one is bigger?",
        answers: ["Ant", "Tardigrade"],
        correct: "Ant",
        fact: "A tardigrade is tiny, around 0.1 to 1.5 millimeters. Many ants are 1 to 5 millimeters."
      },
      {
        emoji: "🐋",
        question: "What is the largest animal ever known?",
        answers: ["Blue whale", "Elephant"],
        correct: "Blue whale",
        fact: "A blue whale can grow up to about 30 meters long. That is longer than a basketball court!"
      },
      {
        emoji: "🦒",
        question: "Which animal is taller?",
        answers: ["Giraffe", "Horse"],
        correct: "Giraffe",
        fact: "A giraffe can be up to 5.5 meters tall. Horses are much shorter."
      },
      {
        emoji: "🦖",
        question: "T. rex was about 12 meters long. True or false?",
        answers: ["True", "False"],
        correct: "True",
        fact: "T. rex was huge, around 12 meters long. That is just for fun, because it is extinct now."
      },
      {
        emoji: "📦",
        question: "A cube that is 1 foot wide has how many cubic inches?",
        answers: ["12", "1,728"],
        correct: "1,728",
        fact: "One foot is 12 inches. A cube is 12 × 12 × 12, so it becomes 1,728 cubic inches."
      },
      {
        emoji: "📏",
        question: "If you double a cube’s side, what happens to the volume?",
        answers: ["It gets 2 times bigger", "It gets 8 times bigger"],
        correct: "It gets 8 times bigger",
        fact: "Volume grows by length × width × height. Double means 2 × 2 × 2 = 8 times bigger."
      },
      {
        emoji: "🧊",
        question: "If you double a cube’s side, what happens to the surface area?",
        answers: ["It gets 4 times bigger", "It gets 8 times bigger"],
        correct: "It gets 4 times bigger",
        fact: "Surface area grows like a square. Double means 2 × 2 = 4 times bigger."
      },
      {
        emoji: "🐭",
        question: "Who can fall from a tree more safely?",
        answers: ["Mouse", "Human"],
        correct: "Mouse",
        fact: "Small animals are light for their size. That is one reason a mouse can survive falls better than a human."
      },
      {
        emoji: "🐘",
        question: "Why can ants carry so much but elephants cannot jump well?",
        answers: ["Small bodies scale better", "Ants are magic"],
        correct: "Small bodies scale better",
        fact: "This is the square-cube law. Bigger bodies get heavy faster than their bones get strong."
      },
      {
        emoji: "👣",
        question: "Could a 60-foot fairy-tale giant really stand like a normal human?",
        answers: ["Probably no", "Easy yes"],
        correct: "Probably no",
        fact: "If a human became huge, weight would grow much faster than bone strength. The legs would have a big problem."
      },
      {
        emoji: "🐟",
        question: "Which is the biggest fish alive?",
        answers: ["Whale shark", "Blue whale"],
        correct: "Whale shark",
        fact: "A whale shark is the biggest fish alive. A blue whale is bigger, but it is a mammal, not a fish."
      }
    ];

    let questions = [];
    let currentIndex = 0;
    let score = 0;
    let answered = false;

    const scoreEl = document.getElementById("score");
    const numberEl = document.getElementById("number");
    const totalEl = document.getElementById("total");
    const emojiEl = document.getElementById("emoji");
    const questionEl = document.getElementById("question");
    const answersEl = document.getElementById("answers");
    const feedbackEl = document.getElementById("feedback");
    const factEl = document.getElementById("fact");
    const nextBtn = document.getElementById("nextBtn");

    function shuffle(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function startGame() {
      questions = shuffle(allQuestions).slice(0, 10);
      currentIndex = 0;
      score = 0;
      totalEl.textContent = questions.length;
      scoreEl.textContent = score;
      showQuestion();
    }

    function showQuestion() {
      answered = false;
      const q = questions[currentIndex];
      numberEl.textContent = currentIndex + 1;
      emojiEl.textContent = q.emoji;
      questionEl.textContent = q.question;
      feedbackEl.textContent = "";
      factEl.textContent = "";
      nextBtn.style.display = "none";
      answersEl.innerHTML = "";

      shuffle(q.answers).forEach(answer => {
        const btn = document.createElement("button");
        btn.textContent = answer;
        btn.onclick = () => chooseAnswer(answer, btn);
        answersEl.appendChild(btn);
      });
    }

    function chooseAnswer(answer, button) {
      if (answered) return;
      answered = true;

      const q = questions[currentIndex];
      const buttons = answersEl.querySelectorAll("button");

      buttons.forEach(btn => {
        if (btn.textContent === q.correct) {
          btn.style.background = "#8ff0b0";
        } else {
          btn.style.background = "#ffd1d1";
        }
      });

      if (answer === q.correct) {
        score++;
        scoreEl.textContent = score;
        feedbackEl.textContent = "Correct! 🎉";
      } else {
        feedbackEl.textContent = "Oops! Good try 🌟";
      }

      factEl.textContent = q.fact;
      nextBtn.style.display = "block";
    }

    nextBtn.onclick = () => {
      currentIndex++;
      if (currentIndex >= questions.length) {
        showEndScreen();
      } else {
        showQuestion();
      }
    };

    function showEndScreen() {
      emojiEl.textContent = "🏆";
      questionEl.textContent = `You got ${score} out of ${questions.length}!`;
      answersEl.innerHTML = "";
      feedbackEl.textContent = score >= 8 ? "Amazing scientist!" : "Great learning! Play again?";
      factEl.textContent = "Every guess teaches your brain something new.";
      nextBtn.textContent = "Play again 🔁";
      nextBtn.style.display = "block";
      nextBtn.onclick = () => {
        nextBtn.textContent = "Next question ➜";
        nextBtn.onclick = () => {
          currentIndex++;
          if (currentIndex >= questions.length) showEndScreen();
          else showQuestion();
        };
        startGame();
      };
    }

    startGame();
  </script>
</body>
</html>
